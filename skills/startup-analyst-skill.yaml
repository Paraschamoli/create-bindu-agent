id: startup-analyst-v1
name: startup-analyst
version: 1.0.0
author: paras@getbindu.com

# Description
description: |
  Analyzes startups and private companies using web search and article extraction.
  Generates markdown-formatted due diligence reports covering business models,
  market opportunity, competitive positioning, financial signals, and risks.
  Uses LLM-based analysis with internet research capabilities.

# Tags and Modes
tags:
  - startup
  - due-diligence
  - venture-capital
  - business-analysis
  - investment
  - competitive-analysis
  - market-research

input_modes:
  - text/plain
  - application/json

output_modes:
  - text/plain
  - application/json

# Example Queries
examples:
  - "Analyze the startup Notion. Evaluate its business model, market opportunity, competitive landscape, strengths, weaknesses, and growth risks."
  - "Evaluate the startup Razorpay. Analyze its revenue model, target market, competitive positioning, scalability potential, funding history impact, and key strategic risks."
  - "Perform comprehensive due diligence on Stripe"
  - "Analyze OpenAI's competitive risks and market position"

# Detailed Capabilities
capabilities_detail:
  primary_capability:
    supported: true
    description: "Performs web-based startup and company due diligence analysis using LLM"
    features:
      - "Web search via DuckDuckGo (default) or Exa (if API key provided)"
      - "Article extraction and content analysis via Newspaper4k"
      - "LLM-based evaluation of business models and market positioning"
      - "Research on funding history and financial indicators from public sources"
      - "Risk identification based on available public information"
      - "Markdown-formatted executive reports"
    limitations: "Limited to publicly available information; no proprietary databases; no guaranteed accuracy of web-sourced data; no automated scoring system"

  secondary_capability:
    supported: true
    description: "Optional memory and advanced scraping capabilities"
    features:
      - "Context retention across sessions via Mem0 (requires MEM0_API_KEY)"
      - "Enhanced web scraping via ScrapeGraph (requires SGAI_API_KEY)"
      - "Supports OpenAI GPT-4o or OpenRouter models"
    limitations: "Memory and ScrapeGraph features require additional API keys; not enabled by default"

# Requirements
requirements:
  packages:
    - "agno"
    - "openai (for OpenAI models)"
    - "duckduckgo-search"
    - "newspaper4k"
    - "bindu-penguin"
    - "python-dotenv"
  optional_packages:
    - "mem0 (for memory features)"
    - "scrapegraph-py (for enhanced scraping)"
  system:
    - "Internet access required"
    - "At least one API key: OPENAI_API_KEY or OPENROUTER_API_KEY"
  min_memory_mb: 512

# Performance Metrics
performance:
  avg_processing_time_ms: 15000
  max_concurrent_requests: "Not specified in code"
  memory_per_request_mb: 512
  scalability: "Depends on LLM provider rate limits"

# Tool Restrictions
allowed_tools:
  - "DuckDuckGoTools (web search)"
  - "Newspaper4kTools (article extraction)"
  - "ExaTools (optional, requires EXA_API_KEY)"
  - "Mem0Tools (optional, requires MEM0_API_KEY)"
  - "ScrapeGraphTools (optional, requires SGAI_API_KEY)"

# Rich Documentation
documentation:
  overview: |
    This skill provides LLM-powered startup analysis using web research.
    It searches the internet for company information, extracts content from articles,
    and generates markdown-formatted due diligence reports.

    Uses Agno Agent framework with OpenAI GPT-4o or OpenRouter models.
    Accepts messages via JSON-RPC protocol and returns text-based analysis.
    No automated scoring or structured data extraction - relies on LLM reasoning.

  use_cases:
    when_to_use:
      - "Evaluating startups for investment consideration"
      - "Performing structured due diligence"
      - "Assessing business models and scalability"
      - "Analyzing competitive positioning"
      - "Identifying risks before strategic decisions"
      - "Preparing executive or investor-ready summaries"

    when_not_to_use:
      - "Simple company information lookup"
      - "Real-time stock trading decisions"
      - "Legal contract review"
      - "Personal financial advice"
      - "Technical product debugging"

  input_structure: |
    Accepts natural language text requests via JSON-RPC message/send method.

    JSON-RPC Request Format:
    {
      "jsonrpc": "2.0",
      "method": "message/send",
      "params": {
        "message": {
          "role": "user",
          "parts": [{"kind": "text", "text": "Analyze the startup Notion..."}],
          "kind": "message",
          "messageId": "unique-id",
          "contextId": "context-id",
          "taskId": "task-id"
        },
        "skillId": "startup-analyst-v1",
        "configuration": {"acceptedOutputModes": ["application/json"]}
      },
      "id": "request-id"
    }

    Constraints:
    - Text-based queries only
    - No structured parameters (analysis_depth, focus_areas, etc.) - not supported by code
    - LLM interprets request and decides research approach

  output_format: |
    Returns markdown-formatted text report via JSON-RPC response.

    JSON-RPC Response Format:
    {
      "jsonrpc": "2.0",
      "id": "request-id",
      "result": {
        "id": "task-id",
        "status": {"state": "completed"},
        "history": [{"role": "assistant", "parts": [{"kind": "text", "text": "# Company - Report..."}]}],
        "artifacts": [{"name": "result", "parts": [{"kind": "text", "text": "# Report..."}]}]
      }
    }

    Report Structure (Markdown):
    - Executive Summary
    - Company Profile (business model, market, team, technology)
    - Financial & Growth Metrics (funding, revenue, growth trajectory)
    - Risk Assessment (market, technology, team, financial risks)
    - Strategic Recommendations
    - Sources & Methodology

    Note: No automated scoring system; no structured JSON data extraction

  error_handling:
    - "Missing API keys: Raises ValueError with setup instructions"
    - "Agent not initialized: Raises RuntimeError"
    - "LLM errors: Propagated from underlying model provider"
    - "Web search failures: Falls back to available tools or notes limitations"
    - "No explicit retry logic in code"

  examples:
    - title: "Notion Startup Analysis"
      input:
        text: "Analyze the startup Notion. Evaluate its business model, market opportunity, competitive landscape, strengths, weaknesses, and growth risks."
      output:
        format: "Markdown text report"
        sections: "Executive Summary, Company Profile, Financial & Growth Metrics, Risk Assessment, Strategic Recommendations, Sources & Methodology"
        processing_time: "~20 seconds"

    - title: "Razorpay Evaluation"
      input:
        text: "Evaluate the startup Razorpay. Analyze its revenue model, target market, competitive positioning, scalability potential, funding history impact, and key strategic risks."
      output:
        format: "Markdown text report"
        sections: "Executive Summary, Company Profile, Financial & Growth Metrics, Risk Assessment, Strategic Recommendations, Sources & Methodology"
        processing_time: "~19 seconds"

  best_practices:
    for_developers:
      - "Set at least one API key: OPENAI_API_KEY or OPENROUTER_API_KEY"
      - "Optional: Set EXA_API_KEY for better search, MEM0_API_KEY for memory, SGAI_API_KEY for scraping"
      - "Use JSON-RPC protocol for communication"
      - "Poll tasks/get endpoint to retrieve completed analysis"
      - "Expect markdown text output, not structured JSON"

    for_orchestrators:
      - "Route startup analysis and due diligence queries here"
      - "Task status: submitted → completed (async processing)"
      - "No built-in timeout in code - implement at orchestrator level"
      - "No scoring system - LLM generates qualitative analysis only"

  installation: |
    Required packages:
    pip install agno openai duckduckgo-search newspaper4k bindu-penguin python-dotenv

    Environment variables (at least one required):
    - OPENAI_API_KEY (for OpenAI GPT-4o)
    - OPENROUTER_API_KEY (for OpenRouter models)

    Optional environment variables:
    - EXA_API_KEY (for Exa search instead of DuckDuckGo)
    - MEM0_API_KEY (for memory features)
    - SGAI_API_KEY (for ScrapeGraph tools)
    - MODEL_NAME (default: openai/gpt-4o for OpenRouter)

    Run:
    python -m startup_analyst_agent.main

  versioning:
    - version: "1.0.0"
      date: "2026-01-13"
      changes: "Initial release with web-based startup analysis using Agno Agent framework"

# Assessment fields for skill negotiation
assessment:
  keywords:
    - "startup"
    - "due diligence"
    - "investment"
    - "venture capital"
    - "business model"
    - "market opportunity"
    - "competitive analysis"
    - "risk assessment"
    - "SWOT"
    - "company analysis"

  specializations:
    - domain: "publicly documented startups"
      note: "Performance depends on available web information"
    - domain: "technology companies"
      note: "Better coverage due to tech news sources"
    - domain: "venture-backed companies"
      note: "Funding data often publicly available"

  anti_patterns:
    - "stock price check"
    - "buy or sell recommendation"
    - "legal contract review"
    - "technical implementation help"
    - "simple company lookup"

  complexity_indicators:
    simple:
      - "company overview"
      - "basic business model"
    medium:
      - "market opportunity analysis"
      - "funding history review"
      - "competitive positioning"
    complex:
      - "comprehensive due diligence"
      - "multi-faceted risk analysis"
      - "strategic recommendations"
    note: "All complexity levels use same LLM-based approach; no tiered processing"